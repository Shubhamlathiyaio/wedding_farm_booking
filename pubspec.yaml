name: wedding_farm_booking
description: Urban Harvest — Indian Marriage Farm Booking Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.0.0

  # State Management & DI
  get: ^4.6.6
  get_it: ^7.6.7
  injectable: ^2.3.2

  # UI
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.0

  # Routing
  go_router: ^13.0.0

  # Utils
  intl: ^0.19.0
  get_storage: ^2.1.1
  image_picker: ^1.2.1
  path_provider: ^2.1.5
  url_launcher: ^6.3.0
  flutter_svg: ^2.2.3
  flutter_stripe: ^12.3.0
  qr_flutter: ^4.1.0
  image: ^4.1.7
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  injectable_generator: ^2.4.1
  build_runner: ^2.4.12
  flutter_gen: ^5.12.0
  flutter_gen_runner: ^5.9.0

flutter:
  uses-material-design: true
  generate: true
  
  assets:
    - assets/images/
    - assets/svg/
    - assets/locales/
